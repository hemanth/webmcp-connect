<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>webmcp-connect — Example</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --border: #262626;
            --text: #e5e5e5;
            --muted: #737373;
            --accent: #22c55e;
            --accent-dim: #16a34a;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        h1 span {
            color: var(--accent);
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.8rem;
            margin-bottom: 2rem;
        }

        .connect-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.6rem 0.75rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0.6rem 1.25rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: var(--accent-dim);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--muted);
        }

        .dot.connected {
            background: var(--accent);
            animation: pulse 2s infinite;
        }

        .dot.error {
            background: var(--error);
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .section-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 0.75rem;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .tool-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.75rem;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .tool-card:hover {
            border-color: var(--accent);
        }

        .tool-card.active {
            border-color: var(--accent);
        }

        .tool-name {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .tool-desc {
            font-size: 0.75rem;
            color: var(--muted);
            line-height: 1.4;
        }

        .call-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .call-panel.visible {
            display: block;
        }

        .call-panel h3 {
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }

        textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.6rem;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.8rem;
            resize: vertical;
            min-height: 80px;
            outline: none;
            margin-bottom: 0.75rem;
        }

        textarea:focus {
            border-color: var(--accent);
        }

        .log {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 1rem;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.75rem;
            line-height: 1.6;
        }

        .log-entry {
            padding: 0.15rem 0;
        }

        .log-entry.info {
            color: var(--accent);
        }

        .log-entry.error {
            color: var(--error);
        }

        .log-entry.data {
            color: var(--muted);
        }

        .empty {
            color: var(--muted);
            font-size: 0.8rem;
            font-style: italic;
            padding: 2rem;
            text-align: center;
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }
    </style>
</head>

<body>

    <h1><span>webmcp</span>-connect</h1>
    <p class="subtitle">Connect any MCP server to the browser</p>

    <div class="connect-bar">
        <input type="text" id="url" placeholder="https://mcp.example.com/sse" value="">
        <button id="connectBtn">Connect</button>
        <button class="btn-secondary" id="disconnectBtn" disabled>Disconnect</button>
    </div>

    <div class="status">
        <div class="dot" id="dot"></div>
        <span id="statusText">Disconnected</span>
    </div>

    <div id="toolsSection" style="display:none">
        <p class="section-title">Discovered Tools</p>
        <div class="tools-grid" id="toolsGrid"></div>
    </div>

    <div class="call-panel" id="callPanel">
        <h3>Call: <code id="callToolName"></code></h3>
        <textarea id="callArgs" placeholder='{ "key": "value" }'>{}</textarea>
        <div class="actions">
            <button id="callBtn">Run</button>
            <button class="btn-secondary" id="cancelBtn">Cancel</button>
        </div>
    </div>

    <p class="section-title">Log</p>
    <div class="log" id="log">
        <div class="empty">Connect to an MCP server to get started.</div>
    </div>

    <script type="module">
        import { WebMCP } from '../src/index.js';

        let mcp = null;
        let selectedTool = null;

        const $ = id => document.getElementById(id);

        $('connectBtn').addEventListener('click', doConnect);
        $('disconnectBtn').addEventListener('click', doDisconnect);
        $('callBtn').addEventListener('click', doCall);
        $('cancelBtn').addEventListener('click', closePanel);

        function log(msg, type = '') {
            const el = $('log');
            if (el.querySelector('.empty')) el.innerHTML = '';
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${msg}`;
            el.appendChild(entry);
            el.scrollTop = el.scrollHeight;
        }

        async function doConnect() {
            const url = $('url').value.trim();
            if (!url) return;

            const dot = $('dot');
            const status = $('statusText');

            log(`Connecting to ${url}...`, 'info');
            $('connectBtn').disabled = true;

            try {
                mcp = new WebMCP(url, {
                    autoRegister: false, // We'll demo manual interaction
                    logger: { log: (msg) => log(msg, 'info') },
                    onToolCall: (name, args) => log(`→ ${name}(${JSON.stringify(args)})`, ''),
                    onError: (name, err) => log(`✗ ${name}: ${err.message}`, 'error'),
                });

                const result = await mcp.connect();

                dot.className = 'dot connected';
                status.textContent = `Connected — ${result.tools.length} tools`;
                $('disconnectBtn').disabled = false;

                renderTools(result.tools);

                if (result.prompts.length) log(`${result.prompts.length} prompts available`, 'data');
                if (result.resources.length) log(`${result.resources.length} resources available`, 'data');

            } catch (err) {
                dot.className = 'dot error';
                status.textContent = `Error: ${err.message}`;
                log(`Connection failed: ${err.message}`, 'error');
                $('connectBtn').disabled = false;
            }
        }

        function doDisconnect() {
            if (mcp) {
                mcp.disconnect();
                mcp = null;
            }
            $('dot').className = 'dot';
            $('statusText').textContent = 'Disconnected';
            $('toolsSection').style.display = 'none';
            $('callPanel').className = 'call-panel';
            $('connectBtn').disabled = false;
            $('disconnectBtn').disabled = true;
            log('Disconnected.', 'info');
        }

        function renderTools(tools) {
            const grid = $('toolsGrid');
            const section = $('toolsSection');
            grid.innerHTML = '';

            if (!tools.length) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            tools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.innerHTML = `
          <div class="tool-name">${tool.name}</div>
          <div class="tool-desc">${tool.description || 'No description'}</div>
        `;
                card.onclick = () => selectTool(tool, card);
                grid.appendChild(card);
            });
        }

        function selectTool(tool, card) {
            selectedTool = tool;
            $('callToolName').textContent = tool.name;
            $('callArgs').value = JSON.stringify(
                Object.fromEntries(
                    Object.keys(tool.inputSchema?.properties || {}).map(k => [k, ''])
                ), null, 2
            );
            $('callPanel').className = 'call-panel visible';

            document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
        }

        async function doCall() {
            if (!mcp || !selectedTool) return;
            let args;
            try {
                args = JSON.parse($('callArgs').value);
            } catch {
                log('Invalid JSON arguments', 'error');
                return;
            }

            log(`Calling ${selectedTool.name}...`, 'info');
            const result = await mcp.callTool(selectedTool.name, args);

            if (result?.content) {
                result.content.forEach(c => {
                    log(`← ${c.text || JSON.stringify(c)}`, 'data');
                });
            } else {
                log(`← ${JSON.stringify(result)}`, 'data');
            }
        }

        function closePanel() {
            $('callPanel').className = 'call-panel';
            selectedTool = null;
            document.querySelectorAll('.tool-card').forEach(c => c.classList.remove('active'));
        }
    </script>
</body>

</html>
